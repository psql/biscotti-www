<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BISCOTTI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #ff7a00;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
    }
    h1 {
      color: #fff;
      font-weight: 900;
      font-size: clamp(4rem, 18vw, 16rem);
      letter-spacing: 0.02em;
    }
    .logo img {
      width: 40px;
      height: 40px;
      display: block;
    }
    p {
      color: #fff;
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <h1>BISCOTTI</h1>
  <a class="logo" href="https://lingonberry.org" title="Lingonberry Organisation">
    <img src="lingonberry-logo.svg" alt="Lingonberry Organisation">
  </a>
  <p>すべて大丈夫だよ :)</p>
</body>
</html>
