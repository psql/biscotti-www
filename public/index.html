<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🍪🐶 BISCOTTI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍪</text></svg>">
  <meta name="theme-color" content="#ff7a00">
  <meta name="description" content="a very friendly orange terminal run by TanakiOS ── the operating system biscotti runs on. become a ともだち, get a woof when it's your time to play.">
  <meta property="og:title" content="BISCOTTI 🍪🐶 — sign up to play">
  <meta property="og:description" content="a very friendly orange terminal. tanaki lingonberry (the OS biscotti runs on) takes your HEFE questionnaire while biscotti naps. you'll get a woof when it's your time to play. すべて大丈夫だよ :)">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://playbiscotti.com/">
  <meta name="twitter:card" content="summary">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
    }
    body {
      min-height: 100dvh;
      background: #ff7a00;
      background: radial-gradient(120% 120% at 50% 0%, #ff8d1e 0%, #ff7a00 55%, #f26a00 100%);
      font-family: "M PLUS 1 Code", ui-monospace, "Hiragino Maru Gothic ProN", monospace;
      color: #fff;
      overflow: hidden;
    }

    /* ---------- CRT / analogue fx ---------- */
    #crt {
      position: fixed;
      inset: 0;
      z-index: 95;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg,
          rgba(70, 24, 0, 0.08) 0px, rgba(70, 24, 0, 0.08) 1px,
          transparent 1px, transparent 3px),
        radial-gradient(115% 100% at 50% 50%, transparent 62%, rgba(120, 40, 0, 0.22) 100%);
    }
    #crt::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 24vh;
      background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.055), transparent);
      animation: roll 8s linear infinite;
    }
    @keyframes roll {
      from { top: -26vh; }
      to { top: 106vh; }
    }
    #crt::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 205, 130, 0.05);
      animation: flicker 4.6s steps(1) infinite;
    }
    @keyframes flicker {
      0%, 100% { opacity: 0.45; }
      9% { opacity: 0.85; }
      11% { opacity: 0.2; }
      24% { opacity: 0.65; }
      43% { opacity: 0.3; }
      62% { opacity: 0.8; }
      64% { opacity: 0.35; }
      81% { opacity: 0.6; }
    }
    .b, .u, .sys, .tagline, .hint, .promptline input {
      text-shadow:
        0.8px 0 rgba(255, 70, 70, 0.22),
        -0.8px 0 rgba(110, 220, 255, 0.18);
    }
    #hero img {
      filter: drop-shadow(-1.5px 0 rgba(255, 70, 70, 0.18))
              drop-shadow(1.5px 0 rgba(110, 220, 255, 0.15));
    }
    @media (prefers-reduced-motion: reduce) {
      #crt::before, #crt::after { display: none; }
    }

    /* ---------- cinematic load-in ---------- */
    #poweron {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      background: #180700;
      animation: poweron 1.15s ease 0.3s both;
    }
    @keyframes poweron {
      0% { opacity: 1; }
      70% { opacity: 1; }
      82% { opacity: 0.55; }
      88% { opacity: 0.75; }
      100% { opacity: 0; }
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(26px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes heroIn {
      0% { opacity: 0; transform: scale(0.93) translateY(34px); filter: blur(18px) brightness(1.8); }
      55% { opacity: 1; filter: blur(3px) brightness(1.2); }
      100% { opacity: 1; transform: none; filter: none; }
    }
    @keyframes bootIn {
      from { opacity: 0; letter-spacing: 0.6em; }
      to { opacity: 1; letter-spacing: 0.22em; }
    }
    .boot { animation: bootIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both; }
    #hero { animation: heroIn 1.8s cubic-bezier(0.16, 1, 0.3, 1) 1s both; }
    .tagline { animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 2.2s both; }
    #nameform { animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 2.45s both; }
    .hint { animation: rise 0.9s ease 2.8s both; }
    .lingon { animation: rise 0.9s ease 3.1s both; }
    #logs { animation: rise 1s ease 2.7s both; }
    body.docked #hero { animation: none; }
    @media (prefers-reduced-motion: reduce) {
      #poweron { display: none; }
      .boot, #hero, .tagline, #nameform, .hint, .lingon, #coinchip, #logs { animation: none; }
    }

    /* ---------- landing ---------- */
    #landing {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.6rem;
      padding: 1rem;
      transition: opacity 0.6s ease;
      z-index: 2;
    }
    body.docked #landing {
      opacity: 0;
      pointer-events: none;
    }
    .boot {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      color: rgba(255, 244, 228, 0.75);
      text-transform: uppercase;
    }
    .tagline {
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
    }
    #hero {
      width: min(88%, 1100px);
      z-index: 10;
    }
    #hero img {
      width: 100%;
      height: auto;
      display: block;
    }
    #hero.flying {
      position: fixed;
      transition: top 0.9s cubic-bezier(0.22, 1, 0.36, 1),
                  left 0.9s cubic-bezier(0.22, 1, 0.36, 1),
                  width 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ---------- shared prompt / input ---------- */
    .promptline {
      display: flex;
      align-items: baseline;
      width: min(92vw, 620px);
    }
    .promptline .arrow {
      color: #ffdcb0;
      font-weight: 700;
      margin-right: 0.55rem;
    }
    .promptline input {
      flex: 1;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      background: transparent;
      border: none;
      border-bottom: 3px solid rgba(255, 244, 228, 0.45);
      padding: 0.15rem 0.1rem 0.35rem;
      outline: none;
      color: #fff;
      caret-color: #fff;
      border-radius: 0;
    }
    .promptline input:focus {
      border-bottom-color: rgba(255, 244, 228, 0.9);
    }
    .promptline input::placeholder {
      color: rgba(255, 244, 228, 0.55);
      font-weight: 500;
    }
    .hint {
      font-size: 0.78rem;
      color: rgba(255, 244, 228, 0.7);
    }
    .lingon {
      position: absolute;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
    }
    .lingon img {
      width: 36px;
      height: 36px;
      display: block;
    }

    /* ---------- chat ---------- */
    #screen {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 5.2rem 5vw 22vh;
      line-height: 1.95;
      font-size: 1.05rem;
      opacity: 0;
      transition: opacity 0.6s ease 0.35s;
      scrollbar-width: none;
      -webkit-mask-image: linear-gradient(to bottom, transparent 2.6rem, black 5.4rem);
      mask-image: linear-gradient(to bottom, transparent 2.6rem, black 5.4rem);
    }
    #screen::-webkit-scrollbar { display: none; }
    body.docked #screen { opacity: 1; }
    @media (min-width: 768px) {
      #screen {
        font-size: 1.2rem;
        padding: 6rem 6vw 16vh;
      }
    }
    .b {
      color: #fff;
      white-space: pre-wrap;
      margin-bottom: 0.4rem;
      max-width: 46em;
    }
    .b .jp { color: #ffe7c2; }
    .u {
      color: #fff;
      font-weight: 700;
      white-space: pre-wrap;
      margin: 0.5rem 0 1rem;
      max-width: 46em;
    }
    .u::before {
      content: "＞ ";
      color: #ffd9a8;
      font-weight: 400;
    }
    .cursor {
      display: inline-block;
      width: 0.62em;
      height: 1.15em;
      background: #fff;
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink 1.05s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    #chatline {
      display: none;
      margin-top: 0.6rem;
      width: min(88vw, 620px);
    }
    #chatline.on { display: flex; }
    .sys {
      color: rgba(255, 244, 228, 0.85);
      font-size: 0.85em;
      margin: 0.5rem 0;
      max-width: 46em;
      white-space: pre-wrap;
    }
    #cmdhint {
      position: fixed;
      bottom: 1rem;
      left: 1.1rem;
      z-index: 20;
      font-size: 0.72rem;
      color: rgba(255, 244, 228, 0.65);
      animation: rise 1s ease 3.2s both;
      pointer-events: none;
    }
    #cmdhint b { color: rgba(255, 255, 255, 0.9); }
    @media (max-width: 899px) {
      #cmdhint { bottom: calc(2.3rem + env(safe-area-inset-bottom)); left: 0.8rem; font-size: 0.62rem; }
    }

    /* ---------- progress dots ---------- */
    #progress {
      position: fixed;
      top: 1.35rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: none;
      gap: 0.5rem;
      align-items: center;
    }
    body.docked #progress { display: flex; }
    .pdot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 2px solid rgba(255, 244, 228, 0.55);
      background: transparent;
      transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }
    .pdot.done {
      background: #fff;
      border-color: #fff;
      box-shadow: 0 0 7px rgba(255, 255, 255, 0.65);
    }
    .pdot.now {
      border-color: #fff;
      animation: pnow 1.2s ease infinite;
    }
    @keyframes pnow { 50% { box-shadow: 0 0 8px rgba(255, 255, 255, 0.8); border-color: rgba(255,255,255,0.4); } }
    @media (min-width: 900px) { #progress { left: calc((100vw - 290px) / 2); } }
    @media (min-width: 900px) and (max-width: 1120px) { #progress { left: calc((100vw - 230px) / 2); } }
    @media (max-width: 480px) {
      #progress { gap: 0.36rem; top: 1.15rem; }
      .pdot { width: 7px; height: 7px; }
    }

    /* ---------- friend chip ---------- */
    @keyframes pulse {
      30% { transform: scale(1.18); background: rgba(255, 255, 255, 0.3); }
    }
    #coinchip {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 20;
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      background: rgba(120, 50, 0, 0.28);
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 0.3rem 0.85rem;
      backdrop-filter: blur(3px);
      animation: rise 1s ease 3s both;
    }

    #coinchip.pulse { animation: pulse 0.6s ease; }
    #coinchip { text-decoration: none; }
    #coinchip:hover { border-color: rgba(255, 255, 255, 0.85); }

    /* ---------- logs pane ---------- */
    #logs {
      position: fixed;
      z-index: 15;
      background: rgba(140, 60, 0, 0.22);
      color: rgba(255, 240, 220, 0.82);
      font-size: 0.72rem;
      line-height: 1.65;
    }
    .logs-title {
      font-weight: 700;
      letter-spacing: 0.08em;
      color: rgba(255, 244, 228, 0.9);
      border-bottom: 1px solid rgba(255, 244, 228, 0.25);
      padding-bottom: 0.4rem;
      margin-bottom: 0.5rem;
    }
    #logbody { overflow: hidden; }
    .logline { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .logline .t { color: rgba(255, 240, 220, 0.5); margin-right: 0.4rem; }
    .logline.friend { color: #fff; font-weight: 700; }
    @media (min-width: 900px) {
      #logs {
        top: 0;
        right: 0;
        bottom: 0;
        width: 290px;
        border-left: 2px solid rgba(255, 244, 228, 0.25);
        padding: 1rem 1.1rem;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }
      .logs-title {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 1rem 1.1rem 0.5rem;
        background: transparent;
      }
      #screen { padding-right: calc(290px + 4vw); }
      #landing { right: 290px; }
      #coinchip { right: calc(290px + 1.2rem); }
    }
    @media (max-width: 899px) {
      #logs {
        left: 0;
        right: 0;
        bottom: 0;
        border-top: 1px solid rgba(255, 244, 228, 0.25);
        padding: 0.25rem 0.8rem calc(0.25rem + env(safe-area-inset-bottom));
        font-size: 0.66rem;
      }
      .logs-title { display: none; }
      .logline { display: none; }
      .logline:last-child { display: block; }
      #screen { padding-bottom: 26vh; }
    }

    /* ---------- breakpoint guards ---------- */
    .boot { text-align: center; padding: 0 1rem; }
    @media (max-width: 480px) {
      .boot { font-size: 0.6rem; letter-spacing: 0.14em; }
      .b, .u, .sys, .tagline, .hint, .promptline input { text-shadow: none; }
      #hero img { filter: none; }
      #coinchip { font-size: 0.66rem; padding: 0.24rem 0.65rem; top: 3rem; right: 0.8rem; }
      body.docked #hero { width: 88px !important; }
      .tagline { font-size: 1rem; }
    }
    @media (max-height: 660px) {
      #landing { gap: 1rem; }
      #hero { width: min(70%, 640px); }
      .lingon { display: none; }
    }
    @media (min-width: 900px) and (max-width: 1120px) {
      #logs { width: 230px; }
      #screen { padding-right: calc(230px + 4vw); }
      #landing { right: 230px; }
      #coinchip { right: calc(230px + 1.2rem); }
    }
  </style>
</head>
<body>
  <div id="poweron"></div>
  <div id="crt"></div>
  <div id="landing">
    <p class="boot">TanakiOS ── biscotti signup terminal ── サインアップ端末 v1.0</p>
    <div id="hero"><img src="/biscotti-type.svg" alt="BISCOTTI"></div>
    <p class="tagline">すべて大丈夫だよ :)</p>
    <form class="promptline" id="nameform" autocomplete="off">
      <span class="arrow">＞</span>
      <input id="nameinp" type="text" maxlength="120" placeholder="enter your name to play（名前を入力）"
             autocomplete="off" autocapitalize="off" spellcheck="false" autofocus>
    </form>
    <p class="hint">press enter ⏎ で参加</p>
    <a class="lingon" href="https://lingonberry.org" title="Lingonberry Organisation">
      <img src="/lingonberry-logo.svg" alt="Lingonberry Organisation">
    </a>
  </div>

  <div id="screen">
    <div id="log"></div>
    <form class="promptline" id="chatline" autocomplete="off">
      <span class="arrow">＞</span>
      <input id="chatinp" type="text" maxlength="500" autocomplete="off" autocapitalize="off" spellcheck="false">
    </form>
  </div>

  <div id="progress" title="your signup progress"></div>
  <a id="coinchip" href="https://thegivingblock.com/donate/sesame-workshop/" target="_blank" rel="noopener"
     title="creator fees donated to Sesame Workshop — click to give too">🪙 donated <b id="coinval">…</b></a>

  <aside id="logs">
    <div class="logs-title">/var/log/biscotti ── ログ</div>
    <div id="logbody"></div>
  </aside>

  <div id="cmdhint">＞ type <b>/help</b> ── コマンド一覧</div>

  <script>
    const landing = document.getElementById("landing");
    const hero = document.getElementById("hero");
    const nameform = document.getElementById("nameform");
    const nameinp = document.getElementById("nameinp");
    const screen = document.getElementById("screen");
    const log = document.getElementById("log");
    const chatline = document.getElementById("chatline");
    const chatinp = document.getElementById("chatinp");

    const FAST = new URLSearchParams(location.search).has("fast");
    const state = {};
    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
    const scrollDown = () => { screen.scrollTop = screen.scrollHeight; };

    nameinp.focus();
    document.addEventListener("pointerdown", (e) => {
      if (e.target.closest("input, a")) return;
      (document.body.classList.contains("docked") ? chatinp : nameinp).focus();
    });
    document.addEventListener("keydown", (e) => {
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      const inp = document.body.classList.contains("docked") ? chatinp : nameinp;
      if (document.activeElement === inp) return;
      if (e.key.length === 1 || e.key === "Backspace" || e.key === "Enter") inp.focus();
    });

    function fmt(text) {
      const span = document.createElement("span");
      span.textContent = text;
      let html = span.innerHTML;
      html = html.replace(/([　-〿぀-ゟ゠-ヿ＀-￯一-龯]+)/g, '<span class="jp">$1</span>');
      return html;
    }

    async function say(text, { speed = 22, pauseAfter = 420 } = {}) {
      const line = document.createElement("div");
      line.className = "b";
      const body = document.createElement("span");
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      line.appendChild(body);
      line.appendChild(cursor);
      log.appendChild(line);
      scrollDown();
      if (FAST) {
        body.innerHTML = fmt(text);
        scrollDown();
        cursor.remove();
        await sleep(30);
        return;
      }
      let shown = "";
      for (const ch of text) {
        shown += ch;
        body.innerHTML = fmt(shown);
        scrollDown();
        await sleep(/[。、.!?？！…]/.test(ch) ? speed * 7 : speed);
      }
      cursor.remove();
      await sleep(pauseAfter);
    }

    function echo(text) {
      const line = document.createElement("div");
      line.className = "u";
      line.textContent = text;
      log.appendChild(line);
      scrollDown();
    }

    function listen(placeholder = "") {
      return new Promise((resolve) => {
        chatinp.placeholder = placeholder;
        chatline.classList.add("on");
        chatinp.focus();
        scrollDown();
        chatline.onsubmit = (e) => {
          e.preventDefault();
          const v = chatinp.value.trim();
          if (!v) return;
          chatinp.value = "";
          echo(v);
          if (v.startsWith("/")) {
            runCommand(v);
            chatinp.focus();
            scrollDown();
            return;
          }
          chatline.classList.remove("on");
          resolve(v);
        };
      });
    }

    const HELP = `available commands ── コマンド一覧
  /help     this list
  /friends  which friend number you are
  /jar      donation jar status 🪙
  /woof     woof
  /pet      pet biscotti
  /dunk     receive dunking wisdom
  /zen      breathe
  /sudo     become root
  /clear    wipe the terminal
  /credits  who made this
  /logout   forget me（クッキー削除）`;

    const DUNK_WISDOM = [
      "the biscotti does not fear the milk. it becomes the milk.",
      "dunk with intention, or do not dunk at all.",
      "a half-dip in haste is a whole regret. ゆっくりね。",
      "the perfect dunk lasts exactly as long as trust.",
      "crumbs in the cup are memories, not mistakes.",
    ];
    const ZEN = [
      "すべて大丈夫だよ :)",
      "breathe in… 吸って。breathe out… 吐いて。",
      "the oven is warm. you are here. that is enough.",
      "somewhere it is 3pm and someone is having a snack. 平和。",
    ];
    const PETS = [
      "forwarding your pets to biscotti… *happy cookie noises* もっと、he says.",
      "*biscotti wiggles in his sleep* わーい。",
      "*biscotti leans into your hand* ずっとここにいて。",
    ];

    async function runCommand(raw) {
      const cmd = raw.slice(1).trim().toLowerCase().split(/\s+/)[0];
      switch (cmd) {
        case "help":
          sysLine(HELP);
          break;
        case "friends": {
          try {
            const me = await (await fetch("/api/me", { headers: { "Accept": "application/json" } })).json();
            if (me && me.friendNumber) {
              sysLine(`you are friend #${me.friendNumber}. ともだち。🍪`);
            } else {
              sysLine("you're not on my list yet — tell me your name and we'll fix that.");
            }
          } catch {
            sysLine("my registry is rubbing its eyes. try again in a moment.");
          }
          break;
        }
        case "jar":
          sysLine(`donation jar: ${coinval.textContent === "…" ? "warming up…" : coinval.textContent} in creator fees donated to sesame workshop. 🪙\n→ thegivingblock.com/donate/sesame-workshop`);
          break;
        case "woof":
          sysLine("（biscotti, from the other room）わん！ 🐶");
          break;
        case "pet":
          sysLine(PETS[Math.floor(Math.random() * PETS.length)]);
          break;
        case "dunk":
          sysLine("🍪 " + DUNK_WISDOM[Math.floor(Math.random() * DUNK_WISDOM.length)]);
          break;
        case "zen":
          sysLine(ZEN[Math.floor(Math.random() * ZEN.length)]);
          break;
        case "sudo":
          sysLine("nice try. you are not root here. root is a dog. 🐶");
          break;
        case "clear":
          log.innerHTML = "";
          sysLine("terminal cleared. きれい。");
          break;
        case "credits":
          sysLine("TanakiOS ── Lingonberry Jam\nmade with love by pasquale & biscotti. 🍪🐶\nすべて大丈夫だよ :)");
          break;
        case "logout":
          try {
            await fetch("/api/logout", { method: "POST" });
            sysLine("cookie eaten. i've truly forgotten you — sign up again anytime. また会おうね ♥");
            setTimeout(() => location.reload(), 1600);
          } catch {
            sysLine("hmm, couldn't log you out. try again?");
          }
          break;
        default:
          sysLine(`unknown command: /${cmd} ── try /help`);
      }
    }

    const COMMAND_NAMES = ["help", "friends", "jar", "woof", "pet", "dunk", "zen", "sudo", "clear", "credits", "logout"];
    chatinp.addEventListener("keydown", (e) => {
      if (e.key !== "Tab") return;
      e.preventDefault();
      const v = chatinp.value.trim();
      const q = (v.startsWith("/") ? v.slice(1) : v).toLowerCase();
      if (!q) {
        sysLine("commands: " + COMMAND_NAMES.map((c) => "/" + c).join("　"));
        scrollDown();
        return;
      }
      const matches = COMMAND_NAMES.filter((c) => c.startsWith(q));
      if (matches.length === 1) {
        chatinp.value = "/" + matches[0];
      } else if (matches.length > 1) {
        sysLine(matches.map((c) => "/" + c).join("　"));
        scrollDown();
      }
    });

    const SLEEP_REPLIES = [
      "*zzz* … tanakiOS is in standby. /help はいつでも起きてる。",
      "（sleeping）… biscotti woofs softly from another room. try /help.",
      "standby mode. commands only ── /help. おやすみ。",
      "*the terminal hums quietly* … /help if you need me.",
    ];
    // After the conversation ends, the OS goes back to sleep: commands still
    // work, but there's no open-ended chat.
    async function idleLoop() {
      await say("i'm going back to sleep now. standby ── /help stays awake. おやすみ ♥");
      logLine("tanakiOS entering standby… おやすみ");
      while (true) {
        const v = await listen("TanakiOS standby ── /help");
        const word = v.trim().toLowerCase().split(/\s+/)[0].replace(/^\//, "");
        if (COMMAND_NAMES.includes(word)) {
          runCommand("/" + word);
          continue;
        }
        sysLine(SLEEP_REPLIES[Math.floor(Math.random() * SLEEP_REPLIES.length)]);
      }
    }

    async function ask(question, opts, validate) {
      await say(question, opts);
      while (true) {
        const v = await listen(opts && opts.placeholder || "");
        const problem = validate ? await validate(v) : null;
        if (!problem) return v;
        await say(problem);
      }
    }

    async function judgeAnswer(field, question, answer) {
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 12000);
        const r = await fetch("/api/hefe-react", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify({ field, question, answer, name: state.name }),
          signal: ctrl.signal,
        });
        clearTimeout(timer);
        const d = await r.json();
        if (d && d.verdict && d.reply) return d;
      } catch {}
      return { verdict: "ok", reply: "noted. いいね。" };
    }

    // Tanaki reads every answer for real: genuine ones get a genuine reaction,
    // non-answers get pushed back on until the field is actually filled out.
    async function askJudged(field, question, opts) {
      await say(question, opts);
      while (true) {
        const v = await listen(opts && opts.placeholder || "");
        const r = await judgeAnswer(field, question, v);
        await say(r.reply);
        if (r.verdict === "ok") return v;
        await say("so ── same question. " + (opts && opts.reask || "答えて。"));
      }
    }

    // Progress dots: one per onboarding step. The bar is never rendered
    // "perfect" — the last dot stays a pulsing ring even when everything is
    // done, a little nudge that there's always more to complete.
    const PROGRESS_STEPS = 10;
    const progressEl = document.getElementById("progress");
    for (let i = 0; i < PROGRESS_STEPS; i++) {
      const d = document.createElement("span");
      d.className = "pdot";
      progressEl.appendChild(d);
    }
    function setProgress(n) {
      const filled = Math.min(n, PROGRESS_STEPS - 1);
      [...progressEl.children].forEach((d, i) => {
        d.className = "pdot" + (i < filled ? " done" : i === filled ? " now" : "");
      });
    }

    function dockLogo() {
      const r = hero.getBoundingClientRect();
      hero.classList.add("flying");
      hero.style.top = r.top + "px";
      hero.style.left = r.left + "px";
      hero.style.width = r.width + "px";
      document.body.appendChild(hero);
      document.body.classList.add("docked");
      void hero.offsetWidth;
      hero.style.top = "1rem";
      hero.style.left = "1.1rem";
      hero.style.width = "112px";
    }

    const DUNKS = {
      "1": "Full submarine (all the way in)",
      "2": "Polite half-dip",
      "3": "Speedy in-and-out",
      "4": "No dunk. Dry crunch only",
      "5": "I dunk it in something weird",
    };

    async function fetchGreeting(kind, name) {
      const fallback = kind === "new"
        ? [`こんにちは、${name}。`,
           "i'm tanaki lingonberry ── the operating system biscotti runs on. タナキと呼んで。",
           "biscotti is napping right now. 🍪 i keep the guest list warm.",
           "we should get to know each other a little before you can play. いい？"]
        : [`おかえり、${name}。hi again :)`,
           "you're already on my list. すべて大丈夫だよ。"];
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 9000);
        const r = await fetch(`/api/greeting?kind=${kind}&name=${encodeURIComponent(name)}`,
          { headers: { "Accept": "application/json" }, signal: ctrl.signal });
        clearTimeout(timer);
        const d = await r.json();
        if (Array.isArray(d.lines) && d.lines.length) return d.lines;
      } catch {}
      return fallback;
    }

    async function chat() {
      echo(state.name);
      setProgress(1);
      const greetingPromise = fetchGreeting("new", state.name);
      await sleep(FAST ? 30 : 500);
      for (const line of await greetingPromise) {
        await say(line);
      }

      state.email = await ask(
        "where can i reach you? your email, please.（メールアドレス）",
        { placeholder: "you@somewhere.com" },
        (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? null : "hmm… that doesn't look like an email to me. もう一度？"
      );
      setProgress(2);
      await say("got it. i'll keep it safe. 約束する。");

      state.fun_fact = await askJudged(
        "fun_fact",
        "now the important part. tell me something fun about yourself. no boring answers — i read every single one.",
        { placeholder: "something fun…", reask: "something fun about you. 本当のやつ。" }
      );

      setProgress(3);
      await say("okay. quick questionnaire now. i call it HEFE.（ヘフェ）");

      state.hobbies = await askJudged("hobbies",
        "H is for hobbies. what do you do for fun?（趣味は？）",
        { placeholder: "hobbies", reask: "what do you actually do for fun?" });
      setProgress(4);
      state.entertainment = await askJudged("entertainment",
        "E is for entertainment. what are you watching, playing, listening to lately?",
        { placeholder: "shows, games, music…", reask: "watching, playing, listening — anything real." });
      setProgress(5);
      state.favorite_food = await askJudged("favorite_food",
        "F is for favorite food. 好きな食べ物は？",
        { placeholder: "favorite food", reask: "your favorite food. ちゃんと。" });
      setProgress(6);
      state.environment = await askJudged("environment",
        "E is for environment. where in the world do you live?（どこに住んでる？）",
        { placeholder: "city, country, forest…", reask: "where in the world are you, really?" });

      setProgress(7);
      state.dunk_style = DUNKS[await ask(
        "last thing. how do you dunk your biscotti?\n  1. full submarine（全部いく）\n  2. polite half-dip\n  3. speedy in-and-out\n  4. no dunk. dry crunch only\n  5. i dunk it in something weird",
        { placeholder: "1–5" },
        (v) => DUNKS[v.trim()] ? null : "just give me a number, 1 to 5. 番号でお願い。"
      )];

      setProgress(8);
      state.hype = await ask(
        "and how hyped are you to play, from 1 to 11?",
        { placeholder: "1–11" },
        (v) => { const n = parseInt(v, 10); return n >= 1 && n <= 11 ? null : "a number between 1 and 11, please."; }
      );

      setProgress(9);
      await say("……");
      await say("sending you up to the cookie cloud…", { speed: 40 });

      let result;
      try {
        const res = await fetch("/api/signup", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded", "Accept": "application/json" },
          body: new URLSearchParams(state).toString(),
        });
        result = await res.json();
      } catch {
        result = null;
      }

      if (!result || !result.ok) {
        await say("あれ？ something went wrong on my end. refresh and try me again — ごめんね。");
        return;
      }
      if (result.again) {
        await say(`${state.name}… you were already on my list. i never forgot you. ♥`);
      } else if (result.count) {
        await say(`done. you're on the list, ${state.name} — friend #${result.count}. ともだち。`);
      } else {
        await say(`done. you're on the list, ${state.name}.`);
      }
      await say("すべて大丈夫だよ :)");
      setProgress(PROGRESS_STEPS);
      await socialMenu([]);
      await say("biscotti will send you a woof when it's your time to play. わん。またね ♥");
      idleLoop();
    }

    const SOCIAL = {
      instagram: { label: "instagram", url: "https://instagram.com/okpasquale" },
      x: { label: "x（twitter）", url: "https://x.com/okpasquale" },
      tiktok: { label: "tiktok", url: "https://tiktok.com/@okpasquale" },
    };

    function followLink(provider) {
      const div = document.createElement("div");
      div.className = "sys";
      const a = document.createElement("a");
      a.href = SOCIAL[provider].url;
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = `→ follow pasquale on ${SOCIAL[provider].label} ↗`;
      a.style.color = "#fff";
      div.appendChild(a);
      log.appendChild(div);
      scrollDown();
    }

    async function socialMenu(existing) {
      const connected = new Set((existing || []).map((s) => s.provider));
      if (connected.size >= Object.keys(SOCIAL).length) {
        await say("and you're already connected everywhere ── instagram, x, tiktok. 完璧。");
        return;
      }
      await say("one more thing. biscotti has a best friend. his name is pasquale. 人間だよ。");
      await say("if you become real internet friends with him — and he follows you back — you'll get in sooner. 本当。");
      while (true) {
        if (connected.size >= Object.keys(SOCIAL).length) {
          await say("that's all three. フルコンプ。pasquale will know it's you everywhere.");
          break;
        }
        const mark = (p) => connected.has(p) ? " ✓" : "";
        const v = (await ask(
          `tell me your @ so he knows it's you:\n  1. instagram${mark("instagram")}\n  2. x（twitter）${mark("x")}\n  3. tiktok${mark("tiktok")}\n  4. all done`,
          { placeholder: "1–4" },
          (v) => ["1", "2", "3", "4"].includes(v.trim()) ? null : "1, 2, 3 or 4. お願い。"
        )).trim();
        if (v === "4") break;
        const provider = { 1: "instagram", 2: "x", 3: "tiktok" }[v];
        const handle = await ask(
          `what's your @ on ${SOCIAL[provider].label}?`,
          { placeholder: "@you" },
          (h) => /^@?[\w.\-]{1,64}$/.test(h.trim()) ? null : "that doesn't look like a handle. もう一度？"
        );
        try {
          const res = await fetch("/api/socials", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded", "Accept": "application/json" },
            body: new URLSearchParams({ provider, handle }).toString(),
          });
          if (!(await res.json()).ok) throw new Error();
          connected.add(provider);
          await say(`connected. ✨ now go say hi —`);
          followLink(provider);
        } catch {
          await say("hmm, that didn't save. try again in a moment? ごめん。");
        }
      }
    }

    nameform.addEventListener("submit", (e) => {
      e.preventDefault();
      if (state.started) return;
      const v = nameinp.value.trim();
      if (!v) return;
      state.started = true;
      state.name = v;
      dockLogo();
      chat();
    });

    async function returningFriend() {
      let me = null;
      try {
        me = await (await fetch("/api/me", { headers: { "Accept": "application/json" } })).json();
      } catch {}
      if (!me || !me.name) return;
      if (state.started) return;
      state.started = true;
      state.name = me.name;
      nameinp.blur();
      const greetingPromise = fetchGreeting("returning", me.name);
      await sleep(FAST ? 100 : 2600);
      dockLogo();
      setProgress(PROGRESS_STEPS);
      await sleep(FAST ? 30 : 700);
      for (const line of await greetingPromise) {
        await say(line);
      }
      if (me.friendNumber) {
        await say(`you're friend #${me.friendNumber}, in case you forgot. ともだち。`);
      }
      if (me.socials && me.socials.length) {
        await say(`i remember your ${me.socials.map((s) => "@" + s.handle).join(", ")}. ちゃんと覚えてる。`);
      }
      await socialMenu(me.socials || []);
      await say("biscotti will send you a woof when it's your time to play. わん。またね ♥");
      idleLoop();
    }
    returningFriend();

    /* ---------- logs pane + live events ---------- */
    const logbody = document.getElementById("logbody");

    function logLine(text, cls = "") {
      const div = document.createElement("div");
      div.className = "logline" + (cls ? " " + cls : "");
      const t = document.createElement("span");
      t.className = "t";
      t.textContent = new Date().toTimeString().slice(0, 8);
      div.appendChild(t);
      div.appendChild(document.createTextNode(text));
      logbody.appendChild(div);
      while (logbody.children.length > 60) logbody.removeChild(logbody.firstChild);
    }

    function sysLine(text) {
      const div = document.createElement("div");
      div.className = "sys";
      div.innerHTML = fmt(text);
      log.appendChild(div);
      scrollDown();
    }

    const BOOT = [
      "TANAKI BIOS 4.7 — self test… ok",
      "initializing TanakiOS… タナキOS 起動中",
      "loading kernel module: warmth.ko… ok",
      "calibrating orange spectrum… 100%",
      "mounting cookie jar (/dev/jar0)… ok",
      "hydrating friendship matrix… ともだち OK",
      "synchronizing heartbeat with oven clock…",
      "waking biscotti… おはよう 🍪",
      "all systems warm. すべて大丈夫。",
      "listening for new friends…",
    ];
    const AMBIENT = [
      "oven temp nominal. 180°C",
      "crumbs swept. きれい",
      "cookie jar integrity: 100%",
      "somewhere, someone is dunking…",
      "milk levels stable. ミルク OK",
      "daydreaming… ☁️",
      "polishing the jar lid…",
      "humming quietly. ふんふん♪",
    ];
    BOOT.forEach((line, i) => setTimeout(() => logLine(line), 300 + i * 550));
    (function ambient() {
      setTimeout(() => {
        if (Math.random() < 0.3 && coinval.textContent !== "…") {
          logLine(`🪙 jar check: ${coinval.textContent} donated so far. ありがとう`);
        } else {
          logLine(AMBIENT[Math.floor(Math.random() * AMBIENT.length)]);
        }
        ambient();
      }, 18000 + Math.random() * 22000);
    })();

    try {
      const events = new EventSource("/api/events");
      events.addEventListener("friend", (e) => {
        const d = JSON.parse(e.data);
        logLine(`★ new friend: ${d.name}（${d.environment}）`, "friend");
        if (document.body.classList.contains("docked") && d.name !== state.name) {
          sysLine(`＊ ${d.name} just joined the list. ようこそ。`);
        }
      });
      let jarLine = null;
      const JAR_OPENS = [
        "＋ someone just opened the jar",
        "＋ the jar lid creaks open again",
        "＋ footsteps in the jar room…",
        "＋ another visitor peeks inside the jar",
      ];
      events.addEventListener("views", () => {
        if (jarLine) jarLine.remove();
        jarLine = document.createElement("div");
        jarLine.className = "logline";
        const t = document.createElement("span");
        t.className = "t";
        t.textContent = new Date().toTimeString().slice(0, 8);
        jarLine.appendChild(t);
        jarLine.appendChild(document.createTextNode(JAR_OPENS[Math.floor(Math.random() * JAR_OPENS.length)]));
        logbody.appendChild(jarLine);
        while (logbody.children.length > 60) logbody.removeChild(logbody.firstChild);
      });
      events.addEventListener("donation", (e) => {
        const d = JSON.parse(e.data);
        setJar(d.totalUsd);
        logLine(`★ fees donated: ${prettyUsd(d.amountUsd)} → jar now ${prettyUsd(d.totalUsd)} ♥`, "friend");
        if (document.body.classList.contains("docked")) {
          sysLine(`＊ ${prettyUsd(d.amountUsd)} in fees just went to sesame workshop's jar. ありがとう ♥`);
        }
      });
    } catch {}

    /* ---------- donation jar (claimed creator fees) ---------- */
    const coinval = document.getElementById("coinval");
    const coinchip = document.getElementById("coinchip");
    const prettyUsd = (n) => "$" + Number(n).toLocaleString("en-US",
      Number(n) >= 100 ? { maximumFractionDigits: 0 } : { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    let firstJar = true;
    function setJar(usd) {
      const pretty = prettyUsd(usd);
      if (coinval.textContent !== pretty) {
        coinval.textContent = pretty;
        coinchip.classList.remove("pulse");
        void coinchip.offsetWidth;
        coinchip.classList.add("pulse");
      }
      if (firstJar) {
        firstJar = false;
        logLine(`🪙 donation jar online: ${pretty} donated so far`);
      }
    }
    async function pollDonations() {
      try {
        const d = await (await fetch("/api/donations", { headers: { "Accept": "application/json" } })).json();
        if (d && typeof d.donatedUsd === "number") setJar(d.donatedUsd);
      } catch {}
    }
    pollDonations();
    setInterval(pollDonations, 60000);
  </script>
</body>
</html>
